<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard TV — Vendas</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f; --surface:#12121a; --surface2:#1a1a26; --border:rgba(255,255,255,.07);
  --green:#00e676; --gdim:rgba(0,230,118,.12); --blue:#448aff; --bdim:rgba(68,138,255,.12);
  --amber:#ffab40; --adim:rgba(255,171,64,.12); --red:#ff5252; --rdim:rgba(255,82,82,.12);
  --purple:#ce93d8; --pdim:rgba(206,147,216,.12);
  --text:#f0f0f8; --muted:rgba(240,240,248,.45);
  --fd:'Bebas Neue',sans-serif; --fb:'DM Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--fb);overflow:hidden}
#app{width:100%;height:100vh;display:flex;flex-direction:column}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 28px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-family:var(--fd);font-size:24px;letter-spacing:3px;color:var(--green)}
.badge{background:var(--gdim);border:1px solid rgba(0,230,118,.3);color:var(--green);font-size:10px;font-weight:600;letter-spacing:1.5px;padding:3px 10px;border-radius:20px;text-transform:uppercase;margin-left:12px}
.clock{font-family:var(--fd);font-size:26px;letter-spacing:2px}
.dinfo{font-size:11px;color:var(--muted);text-align:right;line-height:1.6}

/* SLIDES */
.sw{flex:1;position:relative;overflow:hidden}
.slide{position:absolute;inset:0;padding:16px 24px;display:flex;flex-direction:column;gap:14px;opacity:0;transform:translateX(50px);transition:opacity .55s ease,transform .55s ease;pointer-events:none}
.slide.active{opacity:1;transform:translateX(0);pointer-events:all}
.slide.exit{opacity:0;transform:translateX(-50px);transition:opacity .3s,transform .3s}

/* SECTION */
.sec{font-family:var(--fd);font-size:13px;letter-spacing:3px;color:var(--muted);display:flex;align-items:center;gap:10px;flex-shrink:0}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}

/* GRIDS */
.r3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.r2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.rf{display:flex;gap:12px;flex:1;min-height:0}
.col{display:flex;flex-direction:column;gap:12px;flex:1;min-height:0}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden}
.card.grow{flex:1}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0}
.card.cg::before{background:linear-gradient(90deg,var(--green),transparent)}
.card.cb::before{background:linear-gradient(90deg,var(--blue),transparent)}
.card.ca::before{background:linear-gradient(90deg,var(--amber),transparent)}
.card.cr::before{background:linear-gradient(90deg,var(--red),transparent)}
.card.cp::before{background:linear-gradient(90deg,var(--purple),transparent)}

.clb{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.cval{font-family:var(--fd);line-height:1}
.cval.lg{font-size:34px} .cval.xl{font-size:64px}
.cval.vg{color:var(--green)} .cval.vb{color:var(--blue)} .cval.va{color:var(--amber)} .cval.vp{color:var(--purple)}
.cmeta{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.cgoal{font-size:11px;color:var(--muted)}
.cpct{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
.pg{background:var(--gdim);color:var(--green)} .pb{background:var(--bdim);color:var(--blue)}
.pa{background:var(--adim);color:var(--amber)} .pr{background:var(--rdim);color:var(--red)}
.bar{margin-top:10px;height:4px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
.bf{height:100%;border-radius:4px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.bg{background:linear-gradient(90deg,var(--green),#00c853)}
.bb{background:linear-gradient(90deg,var(--blue),#82b1ff)}
.ba{background:linear-gradient(90deg,var(--amber),#ffd740)}

/* RANK */
.rl{display:flex;flex-direction:column}
.ri{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border)}
.ri:last-child{border-bottom:none}
.rn{font-family:var(--fd);font-size:20px;width:26px;text-align:center;flex-shrink:0}
.rn.n1{color:#ffd700} .rn.n2{color:#c0c0c0} .rn.n3{color:#cd7f32} .rn.nn{color:var(--muted)}
.ravt{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;flex-shrink:0;border:2px solid}
.rinfo{flex:1;min-width:0}
.rname{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rsub{font-size:10px;color:var(--muted);margin-top:1px}
.rval{text-align:right;flex-shrink:0}
.rvn{font-family:var(--fd);font-size:17px;color:var(--green)}
.rvp{font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;margin-top:2px;display:inline-block}

/* ÚLTIMAS VENDAS */
.sale-list{display:flex;flex-direction:column;gap:8px;overflow:hidden}
.sale-item{display:flex;align-items:center;gap:14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;transition:all .4s;position:relative;overflow:hidden}
.sale-item.new-sale{animation:salePop .8s ease forwards}
.sale-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--green);border-radius:2px 0 0 2px}
@keyframes salePop{0%{transform:translateY(-20px);opacity:0;border-color:var(--green);box-shadow:0 0 20px rgba(0,230,118,.3)}60%{border-color:var(--green);box-shadow:0 0 10px rgba(0,230,118,.2)}100%{transform:translateY(0);opacity:1;border-color:var(--border);box-shadow:none}}
.sale-avt{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;border:2px solid}
.sale-info{flex:1;min-width:0}
.sale-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sale-meta{font-size:11px;color:var(--muted);margin-top:2px}
.sale-val{text-align:right;flex-shrink:0}
.sale-amount{font-family:var(--fd);font-size:22px;color:var(--green)}
.sale-time{font-size:10px;color:var(--muted);margin-top:2px}
.new-badge{background:var(--gdim);border:1px solid var(--green);color:var(--green);font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;letter-spacing:1px;text-transform:uppercase;position:absolute;top:8px;right:8px;animation:fadein 1s ease}
@keyframes fadein{from{opacity:0}to{opacity:1}}

/* KANBAN ENTREGAS */
.kb-wrap{display:flex;gap:10px;flex:1;min-height:0;overflow:hidden}
.kb-col{display:flex;flex-direction:column;flex:1;min-width:0;background:var(--surface2);border-radius:10px;border:1px solid var(--border);overflow:hidden}
.kb-hdr{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.kb-title{font-family:var(--fd);font-size:13px;letter-spacing:2px;text-transform:uppercase}
.kb-count{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
.kb-body{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px}
.kb-body::-webkit-scrollbar{width:3px}
.kb-body::-webkit-scrollbar-track{background:transparent}
.kb-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.kb-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:11px}
.kb-card-name{font-weight:600;line-height:1.3;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kb-card-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.kb-tag{font-size:9px;padding:2px 6px;border-radius:20px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}

/* CONFETTI */
.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden}
.confetti-piece{position:absolute;top:-20px;width:8px;height:8px;opacity:0;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(110vh) rotate(720deg)}}

/* BOTTOM */
.botbar{height:40px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;flex-shrink:0}
.dots{display:flex;gap:7px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:all .3s}
.dot.on{background:var(--green);width:22px;border-radius:4px}
.blb{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.live{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:5px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* LOADING */
.loading{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:100;transition:opacity .8s}
.loading.off{opacity:0;pointer-events:none}
.llogo{font-family:var(--fd);font-size:44px;letter-spacing:4px;color:var(--green)}
.lbar{width:180px;height:3px;background:var(--surface2);border-radius:3px;overflow:hidden}
.lfill{height:100%;background:var(--green);animation:lf 2s ease forwards}
@keyframes lf{from{width:0}to{width:100%}}
.ltxt{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
</style>
</head>
<body>
<div id="app">
  <div class="loading" id="ls">
    <div class="llogo">VENDAS TV</div>
    <div class="lbar"><div class="lfill"></div></div>
    <div class="ltxt" id="ltxt">Conectando ao Supabase...</div>
  </div>
  <div class="topbar">
    <div style="display:flex;align-items:center">
      <div class="logo">VENDAS</div>
      <div class="badge">Ao Vivo</div>
    </div>
    <div style="display:flex;align-items:center;gap:18px">
      <div class="dinfo" id="dinfo">—</div>
      <div class="clock" id="clock">00:00</div>
    </div>
  </div>
  <div class="sw" id="sw"></div>
  <div class="botbar">
    <div class="dots" id="dots"></div>
    <div class="blb"><span class="live"></span>Dados em tempo real</div>
    <div class="blb">Próximo em <span id="cd">15</span>s</div>
  </div>
  <div class="confetti-wrap" id="confetti"></div>
</div>

<script>
const SB='https://zpyamwhoxbfgbdvqjflh.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpweWFtd2hveGJmZ2JkdnFqZmxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTY0ODY2NzksImV4cCI6MjA3MjA2MjY3OX0.o4mGSXQj2KPgoltd9ddyJrUlBhJYcIJfUWoiEDwlSrk';
const TV_EMAIL='tv@organne.com';
const TV_PASS='rovzuj-cirzoV-1petna';
const CU_KEY='pk_85837975_YQAOLQRZ0NH2KMRQQ1FPKRGOXV7FM0A0';
const CU_LIST='901108969096';

let authToken=null;

async function authenticate(){
  try{
    const r=await fetch(`${SB}/auth/v1/token?grant_type=password`,{
      method:'POST',
      headers:{'apikey':KEY,'Content-Type':'application/json'},
      body:JSON.stringify({email:TV_EMAIL,password:TV_PASS})
    });
    const data=await r.json();
    if(data.access_token){
      authToken=data.access_token;
      // Renovar token antes de expirar (a cada 50 minutos)
      setTimeout(authenticate, 50*60*1000);
      return true;
    }
    console.error('Auth falhou:',data);
    return false;
  }catch(e){
    console.error('Erro de autenticação:',e);
    return false;
  }
}

const api=(t,p='')=>fetch(`${SB}/rest/v1/${t}?${p}`,{headers:{'apikey':KEY,'Authorization':'Bearer '+(authToken||KEY)}}).then(r=>r.json());
const cuApi=(path)=>fetch(`https://api.clickup.com/api/v2${path}`,{headers:{'Authorization':CU_KEY}}).then(r=>r.json());

const fmt=v=>{if(v==null)return'—';if(v>=1e6)return'R$ '+(v/1e6).toFixed(1).replace('.',',')+' mi';if(v>=1e3)return'R$ '+Math.round(v/1e3)+' mil';return'R$ '+Math.round(v)};
const pct=(v,g)=>g>0?Math.round(v/g*100):0;
const pCls=p=>p>=100?'pg':p>=70?'pb':p>=40?'pa':'pr';
const cCls=p=>p>=100?'cg':p>=70?'cb':'ca';
const bCls=p=>p>=100?'bg':p>=70?'bb':'ba';
const vCls=p=>p>=100?'vg':p>=70?'vb':'va';
const inits=n=>(n||'').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase()||'?';
const aColor=n=>{const cs=['#00e676','#448aff','#ffab40','#f06292','#ab47bc','#26c6da','#66bb6a'];let h=0;for(let c of n||'')h=(h*31+c.charCodeAt(0))%cs.length;return cs[h]};
const timeAgo=d=>{const diff=(Date.now()-new Date(d))/1000;if(diff<60)return'agora';if(diff<3600)return Math.floor(diff/60)+'min atrás';if(diff<86400)return Math.floor(diff/3600)+'h atrás';return Math.floor(diff/86400)+'d atrás'};

// Clock
const updateClock=()=>{
  const n=new Date();
  document.getElementById('clock').textContent=n.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  const ds=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'],ms=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  document.getElementById('dinfo').textContent=`${ds[n.getDay()]}, ${n.getDate()} ${ms[n.getMonth()]} ${n.getFullYear()}`;
};
setInterval(updateClock,1000);updateClock();

// Dates
const now=new Date(),y=now.getFullYear(),mo=now.getMonth()+1;
const monthStart=`${y}-${String(mo).padStart(2,'0')}-01T00:00:00`;
const wd=now.getDay(),wdOff=wd===0?6:wd-1;
const wk=new Date(now);wk.setDate(now.getDate()-wdOff);wk.setHours(0,0,0,0);
const lws=new Date(wk);lws.setDate(lws.getDate()-7);
const lwe=new Date(wk);lwe.setSeconds(-1);

let slides=[],cur=0,cdVal=15,cdTimer=null;
let lastSaleIds=new Set();
let confettiActive=false;

// CONFETTI
function launchConfetti(){
  if(confettiActive)return;
  confettiActive=true;
  const wrap=document.getElementById('confetti');
  wrap.innerHTML='';
  const colors=['#00e676','#448aff','#ffab40','#f06292','#ce93d8','#ffd700','#ff5252'];
  for(let i=0;i<80;i++){
    const p=document.createElement('div');
    p.className='confetti-piece';
    p.style.left=Math.random()*100+'%';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.width=(Math.random()*8+4)+'px';
    p.style.height=(Math.random()*8+4)+'px';
    p.style.borderRadius=Math.random()>.5?'50%':'2px';
    p.style.animationDuration=(Math.random()*2+2)+'s';
    p.style.animationDelay=(Math.random()*1)+'s';
    wrap.appendChild(p);
  }
  setTimeout(()=>{wrap.innerHTML='';confettiActive=false;},4000);
}

// STATUS CONFIG ENTREGAS
const STATUS_CFG={
  'faturado':{color:'#448aff',bg:'rgba(68,138,255,.12)',label:'Faturado',order:1},
  'em separação':{color:'#ffab40',bg:'rgba(255,171,64,.12)',label:'Em Separação',order:2},
  'separado':{color:'#ce93d8',bg:'rgba(206,147,216,.12)',label:'Separado',order:3},
  'aguardando despacho':{color:'#26c6da',bg:'rgba(38,198,218,.12)',label:'Ag. Despacho',order:4},
  'expedido':{color:'#00e676',bg:'rgba(0,230,118,.12)',label:'Expedido',order:5},
};
const statusOrder=['faturado','em separação','separado','aguardando despacho','expedido'];

async function load(){
  try{
    document.getElementById('ltxt').textContent='Carregando dados de vendas...';
    const [deals,goals,owners,teams,rets,recentDeals]=await Promise.all([
      api('rd_deals','select=owner_id,team_id,value,won_at,source_id&status=eq.won&won_at=gte.'+monthStart),
      api('sales_goals',`select=*&year=eq.${y}&month=eq.${mo}`),
      api('rd_owners','select=id,rd_id,name,team_id&active=eq.true&hidden=eq.false'),
      api('rd_teams','select=id,rd_id,name'),
      api('rd_returns',`select=owner_id,team_id,value,return_date&return_date=gte.${monthStart.split('T')[0]}`),
      api('rd_deals','select=id,owner_id,team_id,value,won_at,source_id&status=eq.won&order=won_at.desc&limit=12'),
    ]);

    document.getElementById('ltxt').textContent='Carregando entregas do ClickUp...';
    let cuTasks=[];
    try{
      const cuRes=await cuApi(`/list/${CU_LIST}/task?order_by=updated&reverse=true&subtasks=false&page=0`);
      cuTasks=cuRes.tasks||[];
    }catch(e){console.warn('ClickUp error:',e)}

    const oMap={},tMap={};
    owners.forEach(o=>{oMap[o.rd_id]=o;oMap[o.id]=o});
    teams.forEach(t=>{tMap[t.rd_id]=t;tMap[t.id]=t});

    const sMap={};
    try{const src=await api('rd_sources','select=id,rd_id,name');src.forEach(s=>{sMap[s.rd_id]=s;sMap[s.id]=s})}catch(e){}

    const oTot={},tTot={};
    deals.forEach(d=>{if(d.owner_id)oTot[d.owner_id]=(oTot[d.owner_id]||0)+(d.value||0);if(d.team_id)tTot[d.team_id]=(tTot[d.team_id]||0)+(d.value||0)});
    rets.forEach(r=>{if(r.owner_id)oTot[r.owner_id]=(oTot[r.owner_id]||0)-(r.value||0);if(r.team_id)tTot[r.team_id]=(tTot[r.team_id]||0)-(r.value||0)});

    const totalMes=deals.reduce((s,d)=>s+(d.value||0),0)-rets.reduce((s,r)=>s+(r.value||0),0);
    const totalSem=deals.filter(d=>new Date(d.won_at)>=wk).reduce((s,d)=>s+(d.value||0),0);
    const totalSemP=deals.filter(d=>{const dt=new Date(d.won_at);return dt>=lws&&dt<=lwe}).reduce((s,d)=>s+(d.value||0),0);
    const metaMes=goals.filter(g=>!g.owner_id&&!g.team_id).reduce((s,g)=>s+(g.target_value||0),0)||goals.reduce((s,g)=>s+(g.target_value||0),0);
    const metaSem=metaMes/4.33;

    const topO=Object.entries(oTot).map(([id,val])=>({id,val,o:oMap[id]})).filter(x=>x.o&&x.val>0).sort((a,b)=>b.val-a.val).slice(0,5);
    const topT=Object.entries(tTot).map(([id,val])=>({id,val,t:tMap[id]})).filter(x=>x.t&&x.val>0).sort((a,b)=>b.val-a.val).slice(0,5);
    const oGoals={},tGoals={};
    goals.forEach(g=>{if(g.owner_id)oGoals[g.owner_id]=(oGoals[g.owner_id]||0)+(g.target_value||0)});
    goals.forEach(g=>{if(g.team_id)tGoals[g.team_id]=(tGoals[g.team_id]||0)+(g.target_value||0)});

    // Detectar novas vendas
    const newIds=new Set(recentDeals.map(d=>d.id));
    const hasNew=lastSaleIds.size>0&&[...newIds].some(id=>!lastSaleIds.has(id));
    if(hasNew) launchConfetti();
    lastSaleIds=newIds;

    buildSlides({totalMes,totalSem,totalSemP,metaMes,metaSem,topO,topT,oGoals,tGoals,oMap,tMap,sMap,recentDeals,cuTasks});
  }catch(e){buildErr(e)}
}

function buildSlides(d){
  const {totalMes,totalSem,totalSemP,metaMes,metaSem,topO,topT,oGoals,tGoals,oMap,tMap,sMap,recentDeals,cuTasks}=d;
  const pMes=pct(totalMes,metaMes),pSem=pct(totalSem,metaSem),pSemP=pct(totalSemP,metaSem);
  const mn=new Date().toLocaleString('pt-BR',{month:'long',year:'numeric'});

  // ── SLIDE 1: Acumulados ──
  const s1=`
    <div class="sec">📊 Acumulados de Venda — ${mn}</div>
    <div class="r3">
      <div class="card ${cCls(pMes)}">
        <div class="clb">Vendido no Mês</div>
        <div class="cval lg ${vCls(pMes)}">${fmt(totalMes)}</div>
        <div class="bar"><div class="bf ${bCls(pMes)}" style="width:${Math.min(pMes,100)}%"></div></div>
        <div class="cmeta"><span class="cgoal">Meta: ${fmt(metaMes)}</span><span class="cpct ${pCls(pMes)}">${pMes}%</span></div>
      </div>
      <div class="card ${cCls(pSemP)}">
        <div class="clb">Semana Passada</div>
        <div class="cval lg ${vCls(pSemP)}">${fmt(totalSemP)}</div>
        <div class="bar"><div class="bf ${bCls(pSemP)}" style="width:${Math.min(pSemP,100)}%"></div></div>
        <div class="cmeta"><span class="cgoal">Meta: ${fmt(metaSem)}</span><span class="cpct ${pCls(pSemP)}">${pSemP}%</span></div>
      </div>
      <div class="card ${cCls(pSem)}">
        <div class="clb">Esta Semana</div>
        <div class="cval lg ${vCls(pSem)}">${fmt(totalSem)}</div>
        <div class="bar"><div class="bf ${bCls(pSem)}" style="width:${Math.min(pSem,100)}%"></div></div>
        <div class="cmeta"><span class="cgoal">Meta: ${fmt(metaSem)}</span><span class="cpct ${pCls(pSem)}">${pSem}%</span></div>
      </div>
    </div>
    <div class="sec" style="margin-top:2px">🎯 Meta do Mês</div>
    <div class="card ${cCls(pMes)} grow" style="display:flex;flex-direction:column;justify-content:center">
      <div class="clb">Atingimento — ${new Date().toLocaleString('pt-BR',{month:'long'})}</div>
      <div class="cval xl ${vCls(pMes)}">${pMes}%</div>
      <div class="bar" style="height:8px;margin-top:14px"><div class="bf ${bCls(pMes)}" style="width:${Math.min(pMes,100)}%"></div></div>
      <div class="cmeta" style="margin-top:10px">
        <span class="cgoal">Realizado: ${fmt(totalMes)}</span>
        <span class="cgoal">Faltam: ${fmt(Math.max(0,metaMes-totalMes))}</span>
        <span class="cgoal">Meta: ${fmt(metaMes)}</span>
      </div>
    </div>`;

  // ── SLIDE 2: Rankings ──
  const mkRank=(items,getGoal,getName,getSub)=>items.map((item,i)=>{
    const meta=getGoal(item),p=pct(item.val,meta),col=aColor(getName(item));
    const nc=['n1','n2','n3','nn','nn'][i];
    const pc=p>=100?'var(--green)':p>=70?'var(--blue)':p>=40?'var(--amber)':'var(--red)';
    const pb=p>=100?'rgba(0,230,118,.1)':p>=70?'rgba(68,138,255,.1)':'rgba(255,171,64,.1)';
    return`<div class="ri">
      <div class="rn ${nc}">${i+1}</div>
      <div class="ravt" style="background:${col}22;border-color:${col}55;color:${col}">${inits(getName(item))}</div>
      <div class="rinfo"><div class="rname">${getName(item)||'—'}</div><div class="rsub">${getSub(item)||''}</div></div>
      <div class="rval"><div class="rvn">${fmt(item.val)}</div>${meta>0?`<div class="rvp" style="background:${pb};color:${pc}">${p}%</div>`:''}</div>
    </div>`;
  }).join('');

  const s2=`
    <div class="sec">🏆 Rankings — ${mn}</div>
    <div class="rf">
      <div class="card grow">
        <div class="clb" style="margin-bottom:10px">Top Vendedores</div>
        <div class="rl">${mkRank(topO,x=>oGoals[x.id]||oGoals[x.o?.rd_id]||0,x=>x.o?.name,x=>tMap[x.o?.team_id]?.name)||'<div style="color:var(--muted);font-size:13px;padding:16px 0">Sem dados</div>'}</div>
      </div>
      <div class="card grow">
        <div class="clb" style="margin-bottom:10px">Top Equipes</div>
        <div class="rl">${mkRank(topT,x=>tGoals[x.id]||tGoals[x.t?.rd_id]||0,x=>x.t?.name,x=>{const c=Object.values(oMap).filter(o=>o.team_id===x.id||o.team_id===x.t?.rd_id).length;return c+' vendedor'+(c!==1?'es':'')})||'<div style="color:var(--muted);font-size:13px;padding:16px 0">Sem dados</div>'}</div>
      </div>
    </div>`;

  // ── SLIDE 3: Últimas Vendas ──
  const salesHtml=recentDeals.slice(0,8).map((d,i)=>{
    const o=oMap[d.owner_id],t=tMap[d.team_id]||tMap[o?.team_id];
    const col=aColor(o?.name||'');
    const src=sMap[d.source_id];
    const isNew=i===0;
    return`<div class="sale-item${isNew?' new-sale':''}">
      ${isNew?'<div class="new-badge">Nova!</div>':''}
      <div class="sale-avt" style="background:${col}22;border-color:${col}55;color:${col}">${inits(o?.name)}</div>
      <div class="sale-info">
        <div class="sale-name">${o?.name||'Vendedor'}</div>
        <div class="sale-meta">${t?.name||''}${src?' · '+src.name:''}</div>
      </div>
      <div class="sale-val">
        <div class="sale-amount">${fmt(d.value)}</div>
        <div class="sale-time">${timeAgo(d.won_at)}</div>
      </div>
    </div>`;
  }).join('');

  const s3=`
    <div class="sec">🎉 Últimas Vendas Fechadas</div>
    <div class="sale-list" style="flex:1;overflow:hidden">${salesHtml}</div>`;

  // ── SLIDE 4: Kanban Entregas ClickUp ──
  const grouped={};
  statusOrder.forEach(s=>grouped[s]=[]);
  cuTasks.forEach(t=>{
    const st=(t.status?.status||'').toLowerCase();
    if(grouped[st])grouped[st].push(t);
    else{grouped[st]=grouped[st]||[];grouped[st].push(t)}
  });

  const activeStatuses=statusOrder.filter(s=>grouped[s]&&grouped[s].length>0);

  const kbCols=activeStatuses.map(st=>{
    const cfg=STATUS_CFG[st]||{color:aColor(st),bg:'rgba(255,255,255,.08)',label:st};
    const tasks=grouped[st]||[];
    const cards=tasks.slice(0,6).map(t=>{
      const tags=(t.tags||[]).map(tg=>`<span class="kb-tag" style="background:${aColor(tg.name)}22;color:${aColor(tg.name)}">${tg.name}</span>`).join('');
      const name=t.name.replace(/^\d+\s+/,'');
      return`<div class="kb-card"><div class="kb-card-name" title="${t.name}">${name}</div><div class="kb-card-tags">${tags}</div></div>`;
    }).join('');
    return`<div class="kb-col">
      <div class="kb-hdr">
        <div class="kb-title" style="color:${cfg.color}">${cfg.label}</div>
        <div class="kb-count" style="background:${cfg.bg};color:${cfg.color}">${tasks.length}</div>
      </div>
      <div class="kb-body">${cards}${tasks.length>6?`<div style="font-size:10px;color:var(--muted);text-align:center;padding:6px">+${tasks.length-6} mais</div>`:''}</div>
    </div>`;
  }).join('');

  const totalEntregas=cuTasks.length;
  const expedidos=(grouped['expedido']||[]).length;

  const s4=`
    <div class="sec">🚚 Entregas ClickUp — Fluxo de Separação</div>
    <div style="display:flex;gap:16px;align-items:center;flex-shrink:0">
      <div class="card cb" style="padding:12px 18px;flex-shrink:0">
        <div class="clb">Total em Aberto</div>
        <div class="cval lg vb">${totalEntregas}</div>
      </div>
      <div class="card cg" style="padding:12px 18px;flex-shrink:0">
        <div class="clb">Expedidos</div>
        <div class="cval lg vg">${expedidos}</div>
      </div>
      <div class="card ca grow" style="padding:12px 18px">
        <div class="clb">Progresso Geral</div>
        <div style="display:flex;align-items:center;gap:12px;margin-top:4px">
          <div class="bar grow" style="margin:0;height:8px;flex:1"><div class="bf ba" style="width:${totalEntregas>0?Math.round(expedidos/totalEntregas*100):0}%"></div></div>
          <span class="cpct pa">${totalEntregas>0?Math.round(expedidos/totalEntregas*100):0}%</span>
        </div>
      </div>
    </div>
    <div class="kb-wrap">${kbCols||'<div style="color:var(--muted);font-size:13px;padding:20px">Nenhuma entrega em aberto</div>'}</div>`;

  // ── SLIDE 5: Destaque Semanal ──
  const best=topO[0],bestT=topT[0];
  const bc=aColor(best?.o?.name||'');
  const s5=`
    <div class="sec">⚡ Destaque da Semana</div>
    <div class="rf">
      <div class="card cg grow" style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center">
        <div class="clb">Total Esta Semana</div>
        <div class="cval vg" style="font-family:var(--fd);font-size:72px;margin:12px 0;line-height:1">${fmt(totalSem)}</div>
        <div style="display:flex;gap:14px;align-items:center">
          <span class="cgoal">Meta: ${fmt(metaSem)}</span>
          <span class="cpct ${pCls(pSem)}">${pSem}%</span>
        </div>
        <div class="bar" style="width:75%;margin-top:16px;height:6px"><div class="bf bg" style="width:${Math.min(pSem,100)}%"></div></div>
      </div>
      <div class="col">
        <div class="card ca grow">
          <div class="clb">🥇 Melhor Vendedor do Mês</div>
          ${best?`<div style="display:flex;align-items:center;gap:12px;margin-top:10px">
            <div class="ravt" style="width:46px;height:46px;font-size:16px;background:${bc}22;border-color:${bc}55;color:${bc}">${inits(best.o?.name)}</div>
            <div><div style="font-size:15px;font-weight:600">${best.o?.name||'—'}</div><div style="font-size:11px;color:var(--muted)">${tMap[best.o?.team_id]?.name||''}</div></div>
          </div><div class="cval va" style="font-size:36px;margin-top:12px">${fmt(best.val)}</div>`
          :'<div style="color:var(--muted);font-size:13px;margin-top:12px">Sem dados</div>'}
        </div>
        <div class="card cb grow">
          <div class="clb">🏢 Melhor Equipe do Mês</div>
          ${bestT?`<div style="font-size:16px;font-weight:600;margin-top:10px">${bestT.t?.name||'—'}</div><div class="cval vb" style="font-size:36px;margin-top:8px">${fmt(bestT.val)}</div>`
          :'<div style="color:var(--muted);font-size:13px;margin-top:12px">Sem dados</div>'}
        </div>
      </div>
    </div>`;

  slides=[s1,s2,s3,s4,s5];
  render();
}

function buildErr(e){
  slides=[`<div class="sec">⚠️ Erro</div><div class="card cr"><div class="clb">Falha ao carregar dados</div><div style="font-size:12px;color:var(--red);margin-top:8px">${e?.message||'Erro desconhecido'}</div></div>`];
  render();
}

function render(){
  const sw=document.getElementById('sw'),de=document.getElementById('dots');
  sw.innerHTML='';de.innerHTML='';
  slides.forEach((html,i)=>{
    const el=document.createElement('div');
    el.className='slide'+(i===0?' active':'');
    el.innerHTML=html;
    sw.appendChild(el);
    const d=document.createElement('div');
    d.className='dot'+(i===0?' on':'');
    de.appendChild(d);
  });
  cur=0;
  animateBars(sw.children[0]);
  document.getElementById('ls').classList.add('off');
  startCD();
}

function animateBars(el){
  if(!el)return;
  el.querySelectorAll('.bf').forEach(b=>{const w=b.style.width;b.style.width='0';setTimeout(()=>b.style.width=w,80)});
}

function goTo(idx){
  const sw=document.getElementById('sw'),els=sw.children,ds=document.getElementById('dots').children;
  if(!els.length)return;
  els[cur].classList.add('exit');els[cur].classList.remove('active');ds[cur].classList.remove('on');
  const prev=cur;
  setTimeout(()=>{els[prev]?.classList.remove('exit');cur=(idx+slides.length)%slides.length;els[cur].classList.add('active');ds[cur].classList.add('on');animateBars(els[cur])},320);
}

function startCD(){
  if(cdTimer)clearInterval(cdTimer);
  cdVal=15;document.getElementById('cd').textContent=cdVal;
  cdTimer=setInterval(()=>{cdVal--;document.getElementById('cd').textContent=cdVal;if(cdVal<=0){goTo(cur+1);cdVal=15}},1000);
}

async function init(){
  document.getElementById('ltxt').textContent='Autenticando...';
  const ok=await authenticate();
  if(!ok){ document.getElementById('ltxt').textContent='Erro de autenticação'; return; }
  await load();
  setInterval(load,2*60*1000);
}
init();
</script>
</body>
</html>
